name: Build CI Images

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-images:
    name: 'Build ${{ matrix.env }}'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env: [utility, ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: tag
        run: |
          TAG=$(head -1 environments/${{ matrix.env }}/image_tag | grep -v '^#' | tr -d '[:space:]')
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env }}-v${{ steps.tag.outputs.version }}"
          docker build --pull -t "$IMAGE" environments/${{ matrix.env }}
          docker push "$IMAGE"
